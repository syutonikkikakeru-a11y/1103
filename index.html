<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>1103 Professional: HERO vs Laggia</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game { display: flex; flex-direction: column; height: 100vh; visibility: hidden; }
        .field-half { flex: 1; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 2px solid #444; }
        .row { display: flex; gap: 10px; min-height: 100px; }
        .slot { width: 65px; height: 95px; border: 1px solid #333; background: rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; }
        .card { width: 65px; height: 95px; border-radius: 4px; font-size: 9px; border: 1px solid #000; position: absolute; box-sizing: border-box; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; padding: 4px; background: #fff; color: #000; }
        .monster { background: #d2b48c; } .spell { background: #1d8c6e; color: #fff; } .trap { background: #ba266d; color: #fff; }
        .def-pos { transform: rotate(90deg); } .back-side { background: #411 !important; color: #411 !important; border: 2px solid #622; }
        #hand { height: 120px; background: #111; display: flex; justify-content: center; align-items: center; gap: 8px; border-top: 3px solid #555; }
        .lp { position: absolute; left: 15px; font-size: 32px; font-weight: bold; font-family: monospace; z-index: 100; text-shadow: 0 0 10px #000; }
        #phase-display { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 10px 20px; border: 2px solid #d4af37; color: #d4af37; font-size: 1.5rem; pointer-events: none; z-index: 2000; border-radius: 5px; }
        #chain-panel { display: none; position: fixed; top: 35%; left: 50%; transform: translateX(-50%); background: #200; border: 3px solid #f00; padding: 20px; z-index: 9000; text-align: center; }
        #menu { display: none; position: fixed; background: #222; border: 1px solid #fff; z-index: 3000; padding: 5px; }
        #menu button { display: block; width: 160px; padding: 12px; margin: 3px; background: #444; color: #fff; border: none; text-align: left; font-size: 14px; cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        #controls { position: fixed; right: 10px; bottom: 130px; display: flex; flex-direction: column; gap: 5px; }
        .p-btn { background: #333; color: #fff; border: 1px solid #666; padding: 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 style="color:#d4af37">1103 ONLINE</h1>
    <div id="peer-id-display" style="color:#aaa; margin-bottom:10px;">PeerID取得中...</div>
    <div id="url-box" style="margin:10px; color:#0cf; font-size:12px; background:#111; padding:10px; border:1px dashed #555;"></div>
    <div id="setup-area">
        <p>1. 相手に上のURLを送り、接続を待ってください</p>
        <p>2. デッキを選択すると開始します</p>
        <button onclick="selectDeck('HERO')" style="background:#135d49; color:#fff; padding:15px; margin:5px; border:none; border-radius:5px; cursor:pointer;">HEROビート</button>
        <button onclick="selectDeck('Laggia')" style="background:#7a1947; color:#fff; padding:15px; margin:5px; border:none; border-radius:5px; cursor:pointer;">ラビットラギア</button>
    </div>
</div>

<div id="phase-display">WAITING...</div>
<div id="controls"><button class="p-btn" onclick="nextPhase()">フェイズ終了</button></div>

<div id="chain-panel">
    <div id="chain-msg" style="color:#fff; margin-bottom:10px;"></div>
    <button onclick="resolveChain(true)" style="background:red; color:white; padding:10px 20px; border:none;">発動</button>
    <button onclick="resolveChain(false)" style="padding:10px 20px; border:none;">スルー</button>
</div>

<div id="game">
    <div class="field-half opponent">
        <div class="lp" style="top:20px; color:#f55;" id="opp-lp">8000</div>
        <div class="row"><div class="slot" id="opp-sz4"></div><div class="slot" id="opp-sz3"></div><div class="slot" id="opp-sz2"></div><div class="slot" id="opp-sz1"></div><div class="slot" id="opp-sz0"></div></div>
        <div class="row"><div class="slot" id="opp-mz4"></div><div class="slot" id="opp-mz3"></div><div class="slot" id="opp-mz2"></div><div class="slot" id="opp-mz1"></div><div class="slot" id="opp-mz0"></div></div>
    </div>
    <div class="field-half player">
        <div class="lp" style="bottom:135px; color:#5f5;" id="my-lp" onclick="adjustLP()">8000</div>
        <div class="row"><div class="slot" id="mz0"></div><div class="slot" id="mz1"></div><div class="slot" id="mz2"></div><div class="slot" id="mz3"></div><div class="slot" id="mz4"></div></div>
        <div class="row"><div class="slot" id="sz0"></div><div class="slot" id="sz1"></div><div class="slot" id="sz2"></div><div class="slot" id="sz3"></div><div class="slot" id="sz4"></div></div>
    </div>
    <div id="hand"></div>
</div>
<div id="menu"></div>

<script>
const DB = {
    air:{n:"E･HERO エアーマン",t:"monster",atk:1800,def:300}, ana:{n:"E･HERO アナザーネオス",t:"monster",atk:1900,def:1300},
    rab:{n:"レスキュー･ラビット",t:"monster",atk:300,def:100}, sab:{n:"セイバーザウルス",t:"monster",atk:1900,def:500},
    war:{n:"神の警告",t:"trap"}, dua:{n:"デュアルスパーク",t:"spell"}, mir:{n:"ミラクル･フュージョン",t:"spell"}, cyc:{n:"サイクロン",t:"spell"}
};
const RECIPES = {
    HERO: ["air","air","air","ana","ana","ana","dua","dua","dua","mir","mir","mir","war","war","war","cyc","cyc","cyc","air","ana","dua","mir","war","cyc","air","ana","dua","mir","war","cyc","air","ana","dua","mir","war","cyc","air","ana","dua","cyc"],
    Laggia: ["rab","rab","rab","sab","sab","sab","war","war","war","cyc","cyc","cyc","rab","sab","war","cyc","rab","sab","war","cyc","rab","sab","war","cyc","rab","sab","war","cyc","rab","sab","war","cyc","rab","sab","war","cyc","rab","sab","war","cyc"]
};

let myDeck=[], peer=new Peer(), conn=null, isMyTurn=false, currentPhase="DP", turnCount=0, myLP=8000, deckSelected=false;

peer.on('open', id => {
    document.getElementById('peer-id-display').innerText = "My ID: " + id;
    document.getElementById('url-box').innerText = window.location.origin + window.location.pathname + "?id=" + id;
    const tid = new URLSearchParams(window.location.search).get('id');
    if(tid) { conn = peer.connect(tid); setupConn(); }
});

peer.on('connection', c => { conn = c; setupConn(); });

function setupConn() {
    conn.on('open', () => {
        console.log("Connected");
        if(deckSelected) checkStart();
    });
    conn.on('data', d => handleSync(d));
}

function selectDeck(key) {
    myDeck = RECIPES[key].sort(() => Math.random() - 0.5);
    deckSelected = true;
    if(conn && conn.open) checkStart();
    else alert("相手が接続するまでお待ちください。");
}

function checkStart() {
    // 自分が親（IDが小さい方）ならオーダーを決めて送る
    if(peer.id < conn.peer) {
        const first = Math.random() > 0.5;
        conn.send({type:'START', first: !first});
        initDuel(first);
    }
}

function initDuel(first) {
    document.getElementById('overlay').style.display='none';
    document.getElementById('game').style.visibility='visible';
    isMyTurn = first; turnCount = 1;
    for(let i=0; i<5; i++) draw();
    updateUI();
}

function draw() { if(myDeck.length){ const id=myDeck.shift(); document.getElementById('hand').appendChild(createCard(id,true)); } }

function createCard(id, isMine) {
    const d=DB[id], el=document.createElement('div');
    el.className=`card ${d.t}`; el.id='c-'+Math.random().toString(36).substr(2,9);
    el.dataset.dbid=id; el.innerHTML=`<b>${d.n}</b>`+(d.t==='monster'?`<br>${d.atk}/${d.def}`:'');
    if(isMine) el.onclick=(e)=>openMenu(e, el);
    return el;
}

function openMenu(e, el) {
    if(!isMyTurn && DB[el.dataset.dbid].t === 'monster') return;
    const m=document.getElementById('menu'), d=DB[el.dataset.dbid];
    m.style.display='block'; m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px';
    window.selectedEl=el;
    let h = (el.parentNode.id==='hand') ? 
        (d.t==='monster' ? `<button onclick="play('SUMMON')">召喚</button><button onclick="play('SET_MON')">セット(横)</button>` : `<button onclick="play('ACTIVATE')">発動</button><button onclick="play('SET_ST')">セット</button>`) :
        `<button onclick="play('GY')">墓地へ</button>`;
    m.innerHTML = h + `<button onclick="document.getElementById('menu').style.display='none'">閉じる</button>`;
}

function play(act) {
    document.getElementById('menu').style.display='none';
    const d = DB[window.selectedEl.dataset.dbid];
    conn.send({type:'CHECK', act, name:d.n, dbid:window.selectedEl.dataset.dbid, cid:window.selectedEl.id});
    window.lastSent = {act, dbid:window.selectedEl.dataset.dbid, cid:window.selectedEl.id, name:d.n};
}

function handleSync(d) {
    if(d.type==='START') initDuel(d.first);
    if(d.type==='PHASE') { isMyTurn=true; currentPhase="DP"; turnCount++; if(turnCount>1) draw(); updateUI(); }
    if(d.type==='CHECK') { document.getElementById('chain-panel').style.display='block'; document.getElementById('chain-msg').innerText=`相手の${d.name}に対して発動ありますか？`; window.pending=d; }
    if(d.type==='RES') { if(!d.chain) finalize(window.lastSent, true); }
    if(d.type==='FINAL') render(d, false);
}

function resolveChain(res) {
    document.getElementById('chain-panel').style.display='none';
    if(!res) { conn.send({type:'RES', chain:false}); render(window.pending, false); }
}

function finalize(d, isMine) { render(d, true); conn.send({...d, type:'FINAL'}); }

function render(d, isMine) {
    const el = isMine ? window.selectedEl : createCard(d.dbid, false);
    const zone = DB[d.dbid].t==='monster' ? (isMine?'mz':'opp-mz') : (isMine?'sz':'opp-sz');
    for(let i=0; i<5; i++) {
        const s = document.getElementById(zone+i);
        if(!s.hasChildNodes() || (isMine && el.parentNode === s)) {
            if(d.act==='SET_MON') el.classList.add('back-side', 'def-pos');
            if(d.act==='SET_ST') el.classList.add('back-side');
            if(d.act==='GY') el.remove(); else s.appendChild(el);
            break;
        }
    }
}

function nextPhase() {
    if(!isMyTurn) return;
    const ps = ["DP","SP","M1","BP","M2","EP"];
    let idx = ps.indexOf(currentPhase);
    if(idx < 5) currentPhase = ps[idx+1];
    else { isMyTurn=false; conn.send({type:'PHASE'}); }
    updateUI();
}

function updateUI() { document.getElementById('phase-display').innerText = isMyTurn ? `YOUR TURN (${currentPhase})` : "OPPONENT TURN"; }
function adjustLP() { let v=prompt("LP増減:"); if(v){ myLP+=parseInt(v); document.getElementById('my-lp').innerText=myLP; } }
</script>
</body>
</html>
